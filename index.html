<!DOCTYPE html>
<html lang="pr-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lojão das calcinhas</title>

    <!-- css -->
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/reset.css">

    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&family=Imperial+Script&display=swap" rel="stylesheet">

    <!-- icons bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>
<body>
    <header>
        <div class="container">
            <img src="./src/logo.jpeg" alt="">
            <h2>Lojão das Calcinhas.</h2>
        </div>
    </header>

    <nav>
        <ul class="menu">
            <li><a href="#">Início</a></li>
            <li><a href="#">Produtos</a></li>
            <li><a href="#">Contato</a></li>
        </ul>
    </nav>

    <div class="botoes-laterais">
        <button id="login" onsubmit="" class="bi bi-person"><span> Login</span></button>
        <button id="carrinho" onsubmit="" class="bi bi-cart-plus-fill"><span> Carrinho</span></button>
    </div>
    
    <div class="redes-sociais">
        <a href="https://www.instagram.com/"><i class="bi bi-instagram"></i></a>
        <a href="https://www.tiktok.com/"><i class="bi bi-tiktok"></i></a>
        <a href="https://www.whatsapp.com/"><i class="bi bi-whatsapp"></i></a>
    </div>   

    <div class="banner">
        <img src="./src/banner.png" alt="Banner da loja" class="banner-img">
    </div>
</body>
</html>
